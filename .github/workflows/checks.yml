name: Checks

# Reusable test/lint/synth gate — the single source of truth for "is this code good to ship".
# Called by ci.yml (on PRs) and by deploy.yml (before it deploys on push to main), so the
# exact same checks gate both the review and the deploy. Python 3.13 matches requires-python
# and the Lambda runtime; Node 22 is the supported LTS (local dev may run newer, jsii-untested).

on:
  workflow_call:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dev tooling
        run: pip install -r backend/requirements-dev.txt
      - name: Lint (ruff — backend + infra)
        run: ruff check backend infra
      - name: Unit tests
        working-directory: backend
        run: python -m pytest

  frontend:
    name: Frontend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Build (includes tsc typecheck)
        working-directory: frontend
        run: npm run build
      - name: Test
        working-directory: frontend
        run: npm test

  infra:
    name: Infra (cdk synth)
    runs-on: ubuntu-latest
    env:
      JSII_SILENCE_WARNING_UNTESTED_NODE_VERSION: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Install CDK CLI
        run: npm install -g aws-cdk@2
      - name: Install infra deps
        run: pip install -r infra/requirements.txt
      - name: Synthesize (no AWS credentials needed — env is pinned in app.py)
        working-directory: infra
        run: cdk synth --all
