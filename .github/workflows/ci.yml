name: CI

# The PR gate: runs the reusable Checks workflow on every pull request into main. On push to
# main the same checks run inside deploy.yml (which gates the deploy on them), so we don't run
# them twice there — this workflow is PR-only.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    uses: ./.github/workflows/checks.yml
