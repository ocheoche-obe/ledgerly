# Template: grouped, monthly Dependabot config (adapt ecosystems/directories per repo).
#
# Principles (see ../SKILL.md):
# - Monthly interval: security updates IGNORE this schedule and arrive immediately,
#   so a slow version-update cadence costs nothing on the safety side.
# - One minor/patch catch-all group per ecosystem -> routine bumps arrive as one PR.
# - Named groups covering ALL update types for interdependent package families
#   (framework + renderer + types; bundler + plugin + test runner) -> majors land
#   atomically instead of as solo PRs that fail peer resolution by construction.
# - Catch-alls exclude the named-group packages so membership is unambiguous.
version: 2
updates:
  - package-ecosystem: pip            # one entry per manifest directory
    directory: /backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      react:                          # all update types, majors included: atomic upgrades
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      vite:
        patterns:
          - vite
          - vitest
          - "@vitejs/*"
      frontend-minor-patch:
        exclude-patterns:             # keep named-group packages out of the catch-all
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
          - vite
          - vitest
          - "@vitejs/*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
